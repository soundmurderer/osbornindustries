<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSBORN_INDUSTRIES_OS v1.0</title>
<style>
@font-face {
  font-family: 'Fixedsys';
  src: url('/osbornindustries/fonts/FSEX302.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  /* backgrounds */
  --g0: #000000;        /* main background */
  --g1: #000010;        /* panel background */
  --g2: #001a08;        /* subtle green tint for ascii bg etc */
  /* green content colors */
  --g3: #006620;        /* dim green — pipes, hints */
  --g4: #009933;        /* secondary green — labels, desc text */
  --g5: #00cc44;        /* primary green — tree text, ascii */
  --g6: #00ff55;        /* bright green — values, highlights */
  /* blue chrome colors */
  --b1: #000055;        /* chrome background — titlebar, headers, statbar */
  --b2: #0000aa;        /* chrome mid — borders, dividers */
  --b3: #00aaaa;        /* cyan — border highlights, selected bg */
  --b4: #55ffff;        /* bright cyan — chrome text */
  --hi: #ffffff;        /* white — selected row text, bold keys */
  --font: 'Fixedsys', 'Courier New', monospace;
  --fs: 16px;
}

html, body {
  background: #000000;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: var(--font);
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
}

/* ── OUTER SHELL ── */
.os {
  width: 100vw;
  height: 100vh;
  background: var(--g0);
  color: var(--g5);
  font-family: var(--font);
  font-size: var(--fs);
  line-height: 1.35;
  border: none;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* phosphor scanlines */
.os::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.09) 2px,
    rgba(0, 0, 0, 0.09) 4px
  );
  z-index: 200;
}

/* ── TITLE BAR ── */
.titlebar {
  background: var(--b1);
  color: var(--b4);
  font-size: 15px;
  padding: 2px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: 0.5px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--b3);
}

/* ── PATH BAR ── */
.pathbar {
  background: var(--b1);
  border-bottom: 1px solid var(--b3);
  padding: 1px 10px;
  font-size: 15px;
  color: var(--b4);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

/* ── THREE-PANE BODY ── */
.body {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── PANE SHARED ── */
.pane {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.pane-tree  { width: 30%; border-right: 1px solid var(--b3); }
.pane-detail{ width: 42%; border-right: 1px solid var(--b3); }
.pane-insp  { width: 28%; }

.pane-header {
  background: var(--b1);
  border-bottom: 1px solid var(--b3);
  padding: 1px 8px;
  font-size: 13px;
  color: var(--b4);
  letter-spacing: 1.5px;
  flex-shrink: 0;
}

.pane-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--b3) var(--g0);
}
.pane-scroll::-webkit-scrollbar { width: 5px; }
.pane-scroll::-webkit-scrollbar-track { background: var(--g0); }
.pane-scroll::-webkit-scrollbar-thumb { background: var(--b3); }

.pane-inner {
  padding: 6px 10px;
}

/* ── TREE ROWS ── */
.trow {
  display: flex;
  align-items: center;
  padding: 0 8px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 15px;
  user-select: none;
}
.trow:hover { background: var(--g2); }
.trow.sel   { background: var(--b3); color: #000000; }

.trow .pipe { color: var(--b2); }
.trow.sel .pipe { color: var(--b1); }
.trow .ico  { color: var(--b3); margin: 0 3px; min-width: 28px; }
.trow.sel .ico { color: #000000; }

/* folder labels blue, project labels green */
.trow.folder-row { color: var(--b4); }
.trow.project-row { color: var(--g5); }
.trow.sel { color: #000000; }

/* ── DETAIL / INSPECTOR SHARED ── */
.sec-title {
  color: var(--b4);
  font-size: 13px;
  letter-spacing: 1.5px;
  border-bottom: 1px solid var(--b2);
  padding-bottom: 1px;
  margin: 10px 0 4px;
}
.sec-title:first-child { margin-top: 0; }

.kv {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin: 2px 0;
  gap: 8px;
}
.kv .k { color: var(--b4); white-space: nowrap; }
.kv .v { color: var(--g5); text-align: right; word-break: break-all; }

.desc-text {
  font-size: 14px;
  color: var(--g4);
  line-height: 1.6;
  margin: 4px 0 8px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}
.tag {
  border: 1px solid var(--g3);
  color: var(--g4);
  font-size: 13px;
  padding: 0 5px;
}

/* ── ASCII BLOCK ── */
.img-wrap {
  position: relative;
  width: 100%;
  height: 80px;
  margin: 8px 0;
  cursor: crosshair;
  border: 1px solid var(--g3);
  background: var(--g2);
  overflow: hidden;
}
.img-ascii {
  position: absolute;
  inset: 0;
  font-size: 6.5px;
  line-height: 1.07;
  letter-spacing: 1.2px;
  color: var(--g5);
  white-space: pre;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
  transition: color 0.2s;
}
.img-wrap:hover .img-ascii { color: var(--g3); }

.img-hint {
  position: absolute;
  bottom: 2px;
  right: 4px;
  font-size: 11px;
  color: var(--g3);
  pointer-events: none;
  transition: opacity 0.2s;
}
.img-wrap:hover .img-hint { opacity: 0; }

/* ── FLOATING SCREENSHOT OVERLAY ── */
#img-float {
  position: fixed;
  display: none;
  pointer-events: none;
  z-index: 999;
  border: 1px solid var(--b3);
  background: var(--g0);
  box-shadow: 0 0 24px rgba(0,170,170,0.35);
  padding: 4px;
}
#img-float img {
  display: block;
  max-width: 480px;
  max-height: 340px;
  object-fit: contain;
}
#img-float .float-label {
  font-family: var(--font);
  font-size: 12px;
  color: var(--b4);
  padding: 3px 2px 1px;
  letter-spacing: 1px;
}

/* ── PROJECT LINK ── */
.proj-link {
  display: inline-block;
  margin-top: 8px;
  font-size: 14px;
  color: var(--g6);
  text-decoration: none;
  border-bottom: 1px solid var(--g3);
}
.proj-link:hover { background: var(--g5); color: var(--g0); }

/* ── PLACEHOLDER ── */
.placeholder {
  color: var(--g3);
  font-size: 15px;
  padding: 40px 10px;
  text-align: center;
  line-height: 2.2;
}

/* ── DISK STATS ── */
.disk-stats {
  border: 1px solid var(--g3);
  padding: 6px 8px;
  margin-top: 8px;
  background: var(--g1);
}
.disk-stats .ds-title {
  color: var(--g6);
  font-size: 12px;
  letter-spacing: 1px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--g3);
}

/* ── STATUS BAR ── */
.statbar {
  border-top: 1px solid var(--b3);
  padding: 2px 10px;
  font-size: 13px;
  color: var(--b4);
  display: flex;
  gap: 20px;
  background: var(--b1);
  flex-wrap: wrap;
  flex-shrink: 0;
}
.statbar .hi { color: var(--hi); }

/* ── COMMAND BAR ── */
.cmdbar {
  background: var(--b1);
  border-top: 1px solid var(--b2);
  padding: 2px 10px;
  font-size: 13px;
  color: var(--b4);
  letter-spacing: 0.5px;
  flex-shrink: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
}
.cmdbar b { color: var(--hi); }
</style>
</head>

// ── TREE HELPERS ──────────────────────────────────────────────────
function flatten(nodes, depth = 0, res = []) {
  for (const n of nodes) {
    res.push({ ...n, depth });
    if (n.children && expanded.has(n.id)) flatten(n.children, depth + 1, res);
  }
  return res;
}

function isLast(node, flat) {
  const i = flat.indexOf(node);
  const next = flat.slice(i + 1).find(n => n.depth <= node.depth);
  return !next || next.depth < node.depth;
}

function treePrefix(node, flat) {
  if (node.depth === 0) return '';
  let p = '';
  for (let i = 1; i < node.depth; i++) p += '│  ';
  p += isLast(node, flat) ? '└─' : '├─';
  return p;
}

function treeIcon(node) {
  if (node.type === 'project') return '   ';
  return expanded.has(node.id) ? '[-]' : '[+]';
}

// ── RENDER TREE ───────────────────────────────────────────────────
function renderTree() {
  flatCache = flatten(TREE);
  const projs = flatCache.filter(n => n.type === 'project');
  document.getElementById('pc').textContent = projs.length;
  const mb = projs.reduce((a, n) => a + (parseFloat(n.size) || 0), 0);
  document.getElementById('pb').textContent = mb.toFixed(1) + ' MB';

  const el = document.getElementById('tree');
  el.innerHTML = '';

  flatCache.forEach(node => {
    const row = document.createElement('div');
    const typeClass = node.type === 'project' ? 'project-row' : 'folder-row';
    row.className = 'trow ' + typeClass + (selected === node.id ? ' sel' : '');
    row.innerHTML =
      `<span class="pipe">${treePrefix(node, flatCache)}</span>` +
      `<span class="ico">${treeIcon(node)}</span>` +
      `<span>${node.label}</span>`;

    row.addEventListener('click', () => {
      if (node.type !== 'project') {
        expanded.has(node.id) ? expanded.delete(node.id) : expanded.add(node.id);
      }
      selected = node.id;
      renderTree();

      // Update path bar
      const parts = ['C:', 'OSBORN_INDUSTRIES'];
      if (node.depth > 0) {
        flatCache
          .filter(n => n.depth > 0 && n.depth < node.depth)
          .forEach(a => parts.push(a.label));
        parts.push(node.label);
      }
      document.getElementById('pathbar').textContent =
        'Path: ' + parts.join('\\') + (node.type !== 'project' ? '\\' : '');

      node.type === 'project' ? renderProject(node) : renderFolder(node);
    });

    el.appendChild(row);
  });
}

  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='78'>
    <rect width='200' height='78' fill='%23001a08'/>
    <text x='100' y='32' font-family='monospace' font-size='11' fill='%2300cc44' text-anchor='middle'>[NO SCREENSHOT]</text>
    <text x='100' y='50' font-family='monospace' font-size='10' fill='%23005522' text-anchor='middle'>${encodeURIComponent(label)}</text>
    <text x='100' y='66' font-family='monospace' font-size='9' fill='%23003a10' text-anchor='middle'>add to img/ folder</text>
  </svg>`;
  return 'data:image/svg+xml,' + svg;
}

// ── RENDER PROJECT ────────────────────────────────────────────────
function renderProject(node) {
  const sc = STATUS_C[node.status] || '#00cc44';
  const asciiArt = ASCII[node.ascii] || Object.values(ASCII)[0];
  const imgSrc = node.img || '';
  const fallback = placeholderSvg(node.label);

  document.getElementById('detail').innerHTML = `
    <div class="sec-title">OVERVIEW</div>
    <div class="img-wrap" id="ascii-hover-block">
      <div class="img-ascii">${escHtml(asciiArt)}</div>
      <span class="img-hint">HOVER TO PREVIEW</span>
    </div>
    <div class="desc-text">${escHtml(node.desc).replace(/\\n\\n/g,'</div><div class="desc-text" style="margin-top:8px;">').replace(/\\n/g,'<br>')}</div>
    <div class="sec-title">TAGS</div>
    <div class="tags">${node.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>
    ${node.link ? `<a class="proj-link" href="${node.link}" target="_blank" rel="noopener">&#9658; VIEW PROJECT</a>` : ''}
  `;

  // Wire up floating preview
  const floatEl  = document.getElementById('img-float');
  const floatImg = document.getElementById('img-float-img');
  const floatLbl = document.getElementById('img-float-label');
  const block    = document.getElementById('ascii-hover-block');

  floatImg.src = imgSrc;
  floatImg.onerror = () => { floatImg.src = fallback; };
  floatLbl.textContent = node.label;

  block.addEventListener('mouseenter', () => {
    floatEl.style.display = 'block';
  });

  block.addEventListener('mousemove', e => {
    const pad = 20;
    const fw = floatEl.offsetWidth  || 490;
    const fh = floatEl.offsetHeight || 360;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + fw > vw - 8) x = e.clientX - fw - pad;
    if (y + fh > vh - 8) y = e.clientY - fh - pad;
    floatEl.style.left = x + 'px';
    floatEl.style.top  = y + 'px';
  });

  block.addEventListener('mouseleave', () => {
    floatEl.style.display = 'none';
  });

  document.getElementById('insp').innerHTML = `
    <div class="sec-title">FILE INFO</div>
    <div class="kv"><span class="k">NAME</span><span class="v">${escHtml(node.label)}</span></div>
    <div class="kv"><span class="k">SIZE</span><span class="v">${escHtml(node.size)}</span></div>
    <div class="kv"><span class="k">VERSION</span><span class="v">${escHtml(node.ver)}</span></div>
    <div class="kv"><span class="k">CREATED</span><span class="v">${escHtml(node.created)}</span></div>
    <div class="kv"><span class="k">MODIFIED</span><span class="v">${escHtml(node.modified)}</span></div>
    <div class="sec-title">STATUS</div>
    <div class="kv"><span class="k">STATUS</span><span class="v" style="color:${sc}">${escHtml(node.status)}</span></div>
    <div class="kv"><span class="k">PLATFORM</span><span class="v">${escHtml(node.platform)}</span></div>
    <div class="sec-title">DISK</div>
    <div class="kv"><span class="k">VOLUME</span><span class="v">C:\\OSBORN</span></div>
    <div class="kv"><span class="k">ATTRIB</span><span class="v">..a.</span></div>
    <div class="kv"><span class="k">TYPE</span><span class="v">${escHtml(node.label.split('.').pop())}</span></div>
    <div class="sec-title">DISK STATS</div>
    <div class="kv"><span class="k">TOTAL FILES</span><span class="v">${flatCache.filter(n=>n.type==='project').length}</span></div>
    <div class="kv"><span class="k">TOTAL BYTES</span><span class="v">${document.getElementById('pb').textContent}</span></div>
    <div class="kv"><span class="k">MATCHING</span><span class="v">1</span></div>
    <div class="kv"><span class="k">TAGGED</span><span class="v">${escHtml(node.tags.length.toString())}</span></div>
  `;
}

// ── RENDER FOLDER ─────────────────────────────────────────────────
function renderFolder(node) {
  const children = node.children || [];
  const projs = children.filter(c => c.type === 'project');
  const dirs  = children.filter(c => c.type === 'folder');

  document.getElementById('detail').innerHTML = `
    <div class="sec-title">DIRECTORY</div>
    <div class="desc-text">Select a project from the tree to view its description and details.</div>
    <div class="sec-title">CONTENTS</div>
    ${children.map(c =>
      `<div class="kv">
        <span class="k">${c.type === 'folder' ? '[DIR]' : '     '}</span>
        <span class="v">${escHtml(c.label)}</span>
      </div>`
    ).join('')}
  `;

  document.getElementById('insp').innerHTML = `
    <div class="sec-title">DIR INFO</div>
    <div class="kv"><span class="k">NAME</span><span class="v">${escHtml(node.label)}</span></div>
    <div class="kv"><span class="k">FILES</span><span class="v">${projs.length}</span></div>
    <div class="kv"><span class="k">SUBDIRS</span><span class="v">${dirs.length}</span></div>
    <div class="kv"><span class="k">CREATED</span><span class="v">${escHtml(node.created || '—')}</span></div>
    <div class="kv"><span class="k">MODIFIED</span><span class="v">${escHtml(node.modified || '—')}</span></div>
    <div class="sec-title">DISK</div>
    <div class="kv"><span class="k">VOLUME</span><span class="v">C:\\OSBORN</span></div>
    <div class="kv"><span class="k">ATTRIB</span><span class="v">d...</span></div>
    <div class="sec-title">DISK STATS</div>
    <div class="kv"><span class="k">TOTAL FILES</span><span class="v">${flatCache.filter(n=>n.type==='project').length}</span></div>
    <div class="kv"><span class="k">TOTAL BYTES</span><span class="v">${document.getElementById('pb').textContent}</span></div>
  `;
}

// ── UTILS ─────────────────────────────────────────────────────────
function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── CLOCK ─────────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const p = v => String(v).padStart(2, '0');
  document.getElementById('clock').textContent =
    `${p(n.getMonth()+1)}-${p(n.getDate())}-${n.getFullYear()}  ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}

// ── F1 ABOUT ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'F1') {
    e.preventDefault();
    document.getElementById('detail').innerHTML = `
      <div class="sec-title">ABOUT</div>
      <div class="desc-text">
        OSBORN_INDUSTRIES_OS  v1.0<br><br>
        Independent software and hardware development.<br>
        Android apps, Windows desktop tools,<br>
        audio engineering, and electronics.<br><br>
        github.com/soundmurderer<br>
        huggingface.co/soundmurderer
      </div>
    `;
    document.getElementById('insp').innerHTML = `
      <div class="sec-title">SYSTEM</div>
      <div class="kv"><span class="k">OS</span><span class="v">OSBORN OS v1.0</span></div>
      <div class="kv"><span class="k">BUILD</span><span class="v">2026.05.04</span></div>
      <div class="kv"><span class="k">AUTHOR</span><span class="v">OSBORN IND.</span></div>
    `;
  }
});

// ── INIT ──────────────────────────────────────────────────────────
renderTree();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
